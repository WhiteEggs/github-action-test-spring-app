name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: myapp
        path: target/github-action-test-spring-app.war
        
  deploy:
    runs-on: tomcat-server
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5.0.0
        with:
          name: myapp
          path: ./deploy
        
      - name: Stop Tomcat
        run: sudo systemctl stop tomcat10
        
      - name: Deploy new WAR
        run: sudo cp ./deploy/github-action-test-spring-app.war /var/lib/tomcat10/webapps
        
      - name: Start Tomcat
        run: sudo systemctl start tomcat10
